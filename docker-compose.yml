services:
  app:
    image: ghcr.io/lazidoca/c2a:latest
    pull_policy: always
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3005:80"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      # 存储后端配置 (可选值: json, sqlite, postgres, git)
       - STORAGE_BACKEND=sqlite
      
      # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
      # - DATABASE_URL=postgresql://user:password@host:5432/dbname
       - DATABASE_URL=sqlite:////app/data/accounts.db
      
      # Git 仓库配置 (当 STORAGE_BACKEND=git 时使用)
      # - GIT_REPO_URL=https://github.com/user/repo.git
      # - GIT_TOKEN=ghp_xxxxxxxxxxxx
      # - GIT_BRANCH=main
      # - GIT_FILE_PATH=accounts.json
      
      # 认证密钥 (可选，覆盖 config.json)
       - CHATGPT2API_AUTH_KEY=${CHATGPT2API_AUTH_KEY}
      
      # 基础 URL (可选)
      # - CHATGPT2API_BASE_URL=https://your-domain.com

      # 注册代理配置 (可选)
       - CHATGPT2API_REGISTER_PROXY_IP=${CHATGPT2API_REGISTER_PROXY_IP}
       - CHATGPT2API_REGISTER_PROXY_PORT=${CHATGPT2API_REGISTER_PROXY_PORT}
       - CHATGPT2API_REGISTER_PROXY_USERNAME=${CHATGPT2API_REGISTER_PROXY_USERNAME}
       - CHATGPT2API_REGISTER_PROXY_PASSWORD=${CHATGPT2API_REGISTER_PROXY_PASSWORD}
